version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: markos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - markos-net
    depends_on:
      - renderer

  renderer:
    # The image tag is resolved from versions.env.
    # CI writes that file on the server before `docker compose pull/up`.
    # Manual restarts should also use:
    #   docker compose --env-file versions.env up -d --no-deps renderer
    image: xuao575/markos-renderer:${MARKOS_VERSION}
    container_name: markos-renderer
    restart: unless-stopped
    
    # 显式引入敏感环境变量文件，将其注入到容器内
    env_file:
      - markos.env

    volumes:
      - ./markos-artifacts:/app/.markos-artifacts

    ports:
      - "50051:50051"
    expose:
      - "3210"
    networks:
      - markos-net
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"

networks:
  markos-net:
    driver: bridge
