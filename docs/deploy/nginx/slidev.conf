server {
    listen 80;
    server_name markos-slides.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name markos-slides.top;

    # Cloudflare Origin CA 证书路径
    ssl_certificate     /etc/nginx/certs/markos-slides.top.pem;
    ssl_certificate_key /etc/nginx/certs/markos-slides.top.key;

    # SSL 优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 健康检查
    location = /healthz {
        proxy_pass         http://renderer:3210;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
        access_log         off;
    }

    # 前端渲染及 SPA 逻辑
    location /p/ {
        proxy_pass             http://renderer:3210;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        proxy_cache_valid      200 1h;
        add_header             Cache-Control "public, max-age=3600" always;
    }

    # 内部 API (利用 VPC Peering 保障安全)
    location /api/ {
        # allow  10.0.0.0/8;
        # allow  172.16.0.0/12;
        # allow  192.168.0.0/16;
        # deny   all;

        proxy_pass           http://renderer:3210;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_read_timeout   120s;
    }

    # 临时导出产物下载（仅允许只读访问）
    location /artifacts/ {
        limit_except GET HEAD { deny all; }

        proxy_pass             http://renderer:3210;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;

        proxy_read_timeout     120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;

        add_header             Cache-Control "private, no-store" always;
    }

    # 封锁内部预览会话路径
    location /preview/ { deny all; }

    location / {
        return 404;
    }
}
