<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历年技改项目（二）</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F2F9FC;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
        }
        
        .slide-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            border-bottom: 4px solid #12377A;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .content-container {
            display: flex;
            flex: 1;
            gap: 60px;
        }
        
        .summary-container {
            flex: 1;
            background: white;
            padding: 40px;
            border-radius: 12px;
            border-top: 8px solid #3D8BC1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(18, 55, 122, 0.08);
        }
        
        .summary-label {
            color: #3D8BC1;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .summary-title {
            color: #12377A;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
        }
        
        .summary-desc {
            color: #666666;
            font-size: 18px;
            line-height: 1.6;
        }
        
        .takeaways-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .takeaway-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .takeaway-icon {
            background-color: #12377A;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 20px;
        }
        
        .takeaway-content {
            flex: 1;
        }
        
        .takeaway-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .takeaway-text {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #666666;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="slide-title">历年技改项目（二）</h1>
        
        <div class="content-container">
            <div class="summary-container">
                <div class="summary-label">技改重点</div>
                <div class="summary-title">分子筛系统优化与<br>产能匹配改造</div>
                <div class="summary-desc">
                    针对冬季运行瓶颈及产能不足问题，通过新增分离设备与管线优化，显著提升了系统的可靠性与处理能力。
                </div>
            </div>
            
            <div class="takeaways-container">
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-snowflake"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">新增分子筛排污气液分离器</div>
                        <div class="takeaway-text">原因：原管线埋深不够，冬季易发生冻堵。改造后有效分离积液，消除冻堵隐患。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-plus-circle"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">1# 分子筛新增进气管线</div>
                        <div class="takeaway-text">原因：2# 分子筛处理量无法满足 CNG 压缩机运行要求。改造后实现了双系统并联运行。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">改造效果</div>
                        <div class="takeaway-text">彻底解决了处理量瓶颈，确保了气质在各种工况下的稳定达标。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
