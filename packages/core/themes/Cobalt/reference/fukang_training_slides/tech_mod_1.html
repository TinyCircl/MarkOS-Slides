<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历年技改项目（一）</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F2F9FC;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
        }
        
        .slide-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            border-bottom: 4px solid #12377A;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .content-container {
            display: flex;
            flex: 1;
            gap: 60px;
        }
        
        .summary-card {
            flex: 0.8;
            background: white;
            padding: 40px;
            border-radius: 12px;
            border-top: 8px solid #3D8BC1;
            box-shadow: 0 8px 24px rgba(18, 55, 122, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .summary-label {
            color: #3D8BC1;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .summary-title {
            color: #12377A;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
        }
        
        .summary-desc {
            color: #666666;
            font-size: 18px;
            line-height: 1.6;
        }
        
        .takeaways-container {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .takeaway-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .takeaway-icon {
            background-color: #12377A;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 20px;
        }
        
        .takeaway-content {
            flex: 1;
        }
        
        .takeaway-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .takeaway-text {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #666666;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="slide-title">历年技改项目（一）</h1>
        
        <div class="content-container">
            <div class="summary-card">
                <div class="summary-label">技改综述</div>
                <div class="summary-title">持续优化<br>提升运行稳定性</div>
                <div class="summary-desc">
                    针对生产运行中发现的冻堵、不合规及积液等问题，通过增设阀门、分离器及管线调整，确保工艺流程的高效与安全。
                </div>
            </div>
            
            <div class="takeaways-container">
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-tools"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">排污管线优化</div>
                        <div class="takeaway-text">新增隔断阀和积液罐。作用：显著减少管线积液，彻底消除管线冬季冻堵现象。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">高低压放散管分置</div>
                        <div class="takeaway-text">原因：原设计不符合 GB50028 规范。通过分置改造，确保系统泄压安全合规。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-vial"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">充气柱放空管线改造</div>
                        <div class="takeaway-text">新增气液分离器。原因：减少放空管线积液，消除管线堵塞隐患，保障充装连续性。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
