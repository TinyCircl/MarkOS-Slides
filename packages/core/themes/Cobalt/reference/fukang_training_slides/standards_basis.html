<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>处理装置的目的和依据</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F2F9FC;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
        }
        
        .slide-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            border-bottom: 4px solid #12377A;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .content-container {
            display: flex;
            flex: 1;
            gap: 60px;
        }
        
        .basis-container {
            flex: 1;
            background: white;
            padding: 40px;
            border-radius: 12px;
            border-top: 8px solid #3D8BC1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .basis-label {
            color: #3D8BC1;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .basis-title {
            color: #12377A;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
        }
        
        .basis-desc {
            color: #666666;
            font-size: 18px;
            line-height: 1.6;
        }
        
        .takeaways-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .takeaway-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .takeaway-icon {
            background-color: #12377A;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 20px;
        }
        
        .takeaway-content {
            flex: 1;
        }
        
        .takeaway-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .takeaway-text {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #666666;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="slide-title">煤层气、天然气处理装置的目的和依据</h1>
        
        <div class="content-container">
            <div class="basis-container">
                <div class="basis-label">核心设计规范</div>
                <div class="basis-title">GB50028-2020<br>《城镇燃气设计规范》</div>
                <div class="basis-desc">
                    该规范是加气站工艺流程设计、设备选型及安全运行的最高准则。所有处理装置的建设与运维必须严格遵循其相关标准要求，确保气质达标。
                </div>
            </div>
            
            <div class="takeaways-container">
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-bullseye"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">处理目的</div>
                        <div class="takeaway-text">通过工艺处理，使煤层气和天然气达到管道输送及城镇燃气使用的相关质量标准。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">安全合规</div>
                        <div class="takeaway-text">确保装置运行符合国家强制性标准，预防安全事故，保障平稳供气。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">气质保证</div>
                        <div class="takeaway-text">满足不同用户对气质成分、压力及露点的特定需求，提升商品天然气竞争力。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
