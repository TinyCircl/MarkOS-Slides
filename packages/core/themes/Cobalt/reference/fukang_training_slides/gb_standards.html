<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GB17820 及 GB18047 标准要求</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F2F9FC;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
        }
        
        .slide-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            border-bottom: 4px solid #12377A;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .content-container {
            display: flex;
            flex: 1;
            gap: 60px;
        }
        
        .standards-summary {
            flex: 0.8;
            background: #12377A;
            color: white;
            padding: 40px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .summary-item {
            margin-bottom: 30px;
        }
        
        .summary-code {
            font-size: 28px;
            font-weight: 800;
            color: #6BAFD3;
            margin-bottom: 5px;
        }
        
        .summary-name {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.9;
        }
        
        .takeaways-container {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .takeaway-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .takeaway-icon {
            background-color: #3D8BC1;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 20px;
        }
        
        .takeaway-content {
            flex: 1;
        }
        
        .takeaway-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .takeaway-text {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #666666;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="slide-title">GB17820 及 GB18047 标准要求</h1>
        
        <div class="content-container">
            <div class="standards-summary">
                <div class="summary-item">
                    <div class="summary-code">GB 17820</div>
                    <div class="summary-name">天然气技术指标与质量要求</div>
                </div>
                <div class="summary-item">
                    <div class="summary-code">GB 18047</div>
                    <div class="summary-name">车用压缩天然气质量标准</div>
                </div>
                <div style="font-size: 16px; opacity: 0.7; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
                    * 严格控制硫化氢、总硫及水露点等核心指标。
                </div>
            </div>
            
            <div class="takeaways-container">
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-microscope"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">GB 17820 核心要求</div>
                        <div class="takeaway-text">规定了天然气作为城镇燃气进入管网前的气质类别、技术要求、试验方法及检验规则。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-car"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">GB 18047 车用标准</div>
                        <div class="takeaway-text">明确了车用压缩天然气的高发热量、总硫、硫化氢及二氧化碳等指标，确保车辆动力性能。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon">
                        <i class="fas fa-tint-slash"></i>
                    </div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">水露点控制</div>
                        <div class="takeaway-text">在最高工作压力下，水露点应比当地最低气温低 5℃，防止管路结冰和设备腐蚀。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
