<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本次培训考核要点及结语</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #F2F9FC;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
        }
        
        .slide-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 40px;
            border-bottom: 4px solid #12377A;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .content-container {
            display: flex;
            flex: 1;
            gap: 60px;
        }
        
        .summary-card {
            flex: 0.8;
            background: white;
            padding: 40px;
            border-radius: 12px;
            border-top: 8px solid #12377A;
            box-shadow: 0 8px 24px rgba(18, 55, 122, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        
        .summary-icon {
            font-size: 64px;
            color: #3D8BC1;
            margin-bottom: 20px;
        }
        
        .summary-title {
            color: #12377A;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
        }
        
        .summary-text {
            color: #666666;
            font-size: 20px;
            line-height: 1.6;
        }
        
        .takeaways-container {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .takeaway-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
        }
        
        .takeaway-icon {
            background-color: #12377A;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
            font-size: 18px;
        }
        
        .takeaway-content {
            flex: 1;
        }
        
        .takeaway-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .takeaway-text {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #666666;
            font-size: 17px;
            line-height: 1.4;
        }
        
        .closing-note {
            margin-top: 40px;
            font-size: 24px;
            color: #3D8BC1;
            font-weight: 700;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="slide-title">本次培训考核要点及结语</h1>
        
        <div class="content-container">
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="summary-title">培训总结</div>
                <div class="summary-text">
                    通过本次培训，全员应深入理解气质标准，熟练掌握站内核心设备参数，并能准确应对工艺变更后的操作要求。
                </div>
                <div class="closing-note">谢谢大家！</div>
            </div>
            
            <div class="takeaways-container">
                <div class="takeaway-item">
                    <div class="takeaway-icon"><i class="fas fa-check"></i></div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">气质与分类</div>
                        <div class="takeaway-text">掌握天然气和煤层气作为城镇燃气的规定及分类依据。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon"><i class="fas fa-check"></i></div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">水露点要求</div>
                        <div class="takeaway-text">明确车用压缩天然气与城镇燃气对水露点的不同控制标准。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon"><i class="fas fa-check"></i></div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">加臭与参数</div>
                        <div class="takeaway-text">熟悉城镇燃气加臭依据、本站加注量及各设备技术参数。</div>
                    </div>
                </div>
                
                <div class="takeaway-item">
                    <div class="takeaway-icon"><i class="fas fa-check"></i></div>
                    <div class="takeaway-content">
                        <div class="takeaway-title">工艺变更执行</div>
                        <div class="takeaway-text">准确掌握历年技改内容及变更后工艺阀门的正确开启状态。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
