<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加臭撬与 CNG 压缩机</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
        .slide-container {
            width: 1280px;
            min-height: 720px; /* keep as required */
            background: #F2F9FC;
            margin: 0 auto;
            /* keep top padding of title at 40px, reduce bottom padding to save height */
            padding: 40px 60px 20px;
            display: grid;
            grid-template-rows: auto auto 1fr;
        }
        
        .slide-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .slide-subtitle {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #3D8BC1;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 400;
        }
        
        .content-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            align-items: center;
        }
        
        .gauges-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px 30px;
            background: white;
            /* reduced padding to lower overall height */
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(18, 55, 122, 0.05);
        }
        
        .gauge-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .gauge-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px; /* slightly reduced spacing */
            text-align: center;
        }
        
        .insights-container {
            display: flex;
            flex-direction: column;
            gap: 12px; /* reduced gap */
        }
        
        .insight-item {
            padding: 12px; /* reduced padding */
            background: rgba(18, 55, 122, 0.05);
            border-left: 6px solid #12377A;
            border-radius: 4px;
        }
        
        .insight-title {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #12377A;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .insight-text {
            font-family: 'Inter', 'Source Han Sans CN', sans-serif;
            color: #666666;
            font-size: 17px;
            line-height: 1.5;
        }
        
        .data-source {
            font-family: 'Inter', sans-serif;
            color: #858481;
            font-size: 14px;
            margin-top: 20px;
            text-align: right;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <h1 class="slide-title">加臭撬与 CNG 压缩机</h1>
        <h2 class="slide-subtitle">核心加注工艺与高压压缩运行参数</h2>
        
        <div class="content-container">
            <div class="gauges-container">
                <div class="gauge-item">
                    <div class="gauge-title">加臭泵设计压力</div>
                    <div style="height: 140px; width: 160px;"> <!-- reduced height -->
                        <canvas id="odorPressureGauge"></canvas>
                    </div>
                </div>
                
                <div class="gauge-item">
                    <div class="gauge-title">加注量 (L)</div>
                    <div style="height: 140px; width: 160px;"> <!-- reduced height -->
                        <canvas id="odorVolumeGauge"></canvas>
                    </div>
                </div>
                
                <div class="gauge-item">
                    <div class="gauge-title">CNG 排气压力</div>
                    <div style="height: 140px; width: 160px;"> <!-- reduced height -->
                        <canvas id="cngExhaustGauge"></canvas>
                    </div>
                </div>
                
                <div class="gauge-item">
                    <div class="gauge-title">CNG 进气压力</div>
                    <div style="height: 140px; width: 160px;"> <!-- reduced height -->
                        <canvas id="cngIntakeGauge"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="insights-container">
                <div class="insight-item">
                    <div class="insight-title">加臭工艺配置</div>
                    <div class="insight-text">
                        采用四氢噻吩作为加臭剂，配备 180 L 储罐及精密隔膜计量泵，确保城镇燃气加臭符合安全规范。
                    </div>
                </div>
                
                <div class="insight-item">
                    <div class="insight-title">压缩机工作形式</div>
                    <div class="insight-text">
                        采用电驱、连续、往复式三级压缩工艺。进气温度严格控制在 ≦ 30 ℃ 以保证压缩效率与设备寿命。
                    </div>
                </div>
                
                <div class="insight-item">
                    <div class="insight-title">处理能力与规模</div>
                    <div class="insight-text">
                        1#～3# 机组排量为 2100 Nm³/h，新型号排量提升至 3100 Nm³/h，满足高峰期加气需求。
                    </div>
                </div>
            </div>
        </div>
        
        <div class="data-source">
            数据来源：阜康通源加气站设备技术说明书
        </div>
    </div>
    
    <script>
        window.addEventListener('load', function() {
            function createGaugeChart(canvasId, value, maxValue, color, unit) {
                const ctx = document.getElementById(canvasId).getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [value, maxValue - value],
                            backgroundColor: [color, 'rgba(0, 0, 0, 0.05)'],
                            borderWidth: 0,
                            cutout: '75%'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false }
                        }
                    },
                    plugins: [{
                        id: 'centerText',
                        beforeDraw: function(chart) {
                            const ctx = chart.ctx;
                            const centerX = (chart.chartArea.left + chart.chartArea.right) / 2;
                            const centerY = (chart.chartArea.top + chart.chartArea.bottom) / 2;
                            ctx.save();
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.font = 'bold 22px Inter, sans-serif';
                            ctx.fillStyle = '#12377A';
                            ctx.fillText(value, centerX, centerY - 5);
                            ctx.font = '12px Inter, sans-serif';
                            ctx.fillStyle = '#858481';
                            ctx.fillText(unit, centerX, centerY + 15);
                            ctx.restore();
                        }
                    }]
                });
            }
            
            createGaugeChart('odorPressureGauge', 2.0, 5.0, '#12377A', 'MPa');
            createGaugeChart('odorVolumeGauge', 2.2, 5.0, '#3D8BC1', 'Liters');
            createGaugeChart('cngExhaustGauge', 25, 40, '#6BAFD3', 'MPa');
            createGaugeChart('cngIntakeGauge', 1.4, 3.0, '#A8D5E5', 'MPa');
        });
    </script>
</body>
</html>
