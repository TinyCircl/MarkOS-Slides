<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impactful Visuals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        .slide-container {
            width: 1280px;
            min-height: 720px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .full-bleed-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1280&q=80');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(31, 71, 136, 0.4), rgba(31, 71, 136, 0.8));
            z-index: 2;
        }
        .content-layer {
            position: relative;
            z-index: 10;
            height: 720px;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            color: white;
        }
        .accent-line {
            width: 80px;
            height: 6px;
            background-color: #4a90e2;
            margin-bottom: 32px;
        }
        .slide-title {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 24px;
            max-width: 800px;
        }
        .slide-subtitle {
            font-size: 32px;
            font-weight: 400;
            opacity: 0.9;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="full-bleed-bg"></div>
        <div class="overlay"></div>
        
        <div class="content-layer">
            <div class="accent-line"></div>
            <h1 class="slide-title">Impactful Visuals</h1>
            <p class="slide-subtitle">Creating Emotional Resonance through Scale and Clarity</p>
        </div>
    </div>
</body>
</html>
