<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Slide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #f8f9fa;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .hex-pattern {
            position: absolute;
            width: 60%;
            height: 100%;
            top: 0;
            left: 20%;
            background-image: url('https://www.transparenttextures.com/patterns/hexellence.png');
            opacity: 0.1;
            z-index: 0;
        }
        .content-card {
            background: white;
            padding: 60px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            z-index: 10;
            text-align: center;
            max-width: 900px;
            width: 100%;
            margin: 40px;
        }
        .title {
            color: #1f4788;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .subtitle {
            color: #666666;
            font-size: 20px;
            font-weight: 400;
        }
        .margin-guide {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            pointer-events: none;
            border: 1px dashed rgba(31, 71, 136, 0.1);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="hex-pattern"></div>
        <div class="content-card">
            <h1 class="title">[Enter Presentation Title Here]</h1>
            <p class="subtitle">[Enter Subtitle or Presenter Name]</p>
        </div>
        <div class="margin-guide"></div>
    </div>
</body>
</html>
