name: Build & Deploy

on:
  push:
    branches: [renderer]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (leave empty to auto-generate)'
        required: false

env:
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: juzilab-480209
  AR_REPO: jgda-repo
  IMAGE_NAME: slidev-renderer
  DEPLOY_DIR: /opt/slidev-renderer

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - name: Checkout renderer branch
        uses: actions/checkout@v4
        with:
          ref: renderer
          path: slidev-renderer

      - name: Checkout slidev branch (local optimization)
        uses: actions/checkout@v4
        with:
          ref: slidev
          path: slidev

      - name: Compute image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            SHA=$(git -C slidev-renderer rev-parse --short HEAD)
            TAG="main-${SHA}"
          fi
          FULL="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image_full=${FULL}" >> $GITHUB_OUTPUT
          echo "Image: ${FULL}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: slidev-renderer/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_full }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCP Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            echo "Deploying image tag: ${{ needs.build.outputs.image_tag }}"

            # Pull the new renderer image
            SLIDEV_VERSION=${{ needs.build.outputs.image_tag }} \
              docker compose pull renderer

            # Rolling restart: only renderer restarts, nginx stays up
            SLIDEV_VERSION=${{ needs.build.outputs.image_tag }} \
              docker compose up -d --no-deps renderer

            # Prune dangling images to free disk space
            docker image prune -f

            echo "Deployment complete: ${{ needs.build.outputs.image_tag }}"
