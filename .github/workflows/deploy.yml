name: Build & Deploy

on:
  push:
    tags:
      - 'renderer/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (leave empty to auto-generate)'
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: xuao575/slidev-renderer
  DOCKER_PLATFORMS: linux/amd64
  DEPLOY_DIR: /opt/slidev-server

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout renderer branch
        uses: actions/checkout@v4
        with:
          ref: renderer
          path: slidev-renderer

      - name: Checkout slidev branch (local optimization)
        uses: actions/checkout@v4
        with:
          ref: slidev
          path: slidev

      - name: Compute image tag
        id: meta
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/renderer/* ]]; then
            TAG="${GITHUB_REF#refs/tags/renderer/}"
          else
            SHA=$(git -C slidev-renderer rev-parse --short HEAD)
            TAG="snapshot-${SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image: ${{ env.IMAGE_NAME }}:${TAG}"

      - name: Print source revisions
        run: |
          echo "Renderer ref:"
          git -C slidev-renderer rev-parse HEAD
          git -C slidev-renderer log -1 --oneline
          echo "Slidev ref:"
          git -C slidev rev-parse HEAD
          git -C slidev log -1 --oneline

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: slidev-renderer/Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCP Server
    needs: build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout renderer branch
        uses: actions/checkout@v4
        with:
          ref: renderer

      - name: Sync docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          source: docs/deploy/docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            echo "Deploying image tag: ${{ needs.build.outputs.image_tag }}"

            # Persist the deployed image tag on the server so manual restarts
            # and version checks use the same source of truth as CI/CD.
            cat > versions.env <<'EOF'
            SLIDEV_VERSION=${{ needs.build.outputs.image_tag }}
            EOF

            echo "Using versions.env:"
            cat versions.env

            # Pull the new renderer image using the persisted version file.
            docker compose --env-file versions.env pull renderer

            # Rolling restart: only renderer restarts, nginx stays up.
            docker compose --env-file versions.env up -d --no-deps renderer

            # Prune dangling images to free disk space
            docker image prune -f

            echo "Deployment complete: ${{ needs.build.outputs.image_tag }}"
